# Package: basement_lighting
# Manages all lighting automation for the Workshop/Basement area.
# Motion sensor: binary_sensor.motion_sensor_1_occupancy (ZHA)
# Target: all switches in area basement (area_id: basement)
#
# Migrated from automations.yaml — 2026-05-09
# Original IDs preserved for traceability.

automation:

  - id: 'pkg_basement_lights_on'
    alias: 'lighting.basement.motion_lights_on'
    description: 'Turn on all basement switches when Motion Sensor 1 detects occupancy.'
    triggers:
      - trigger: state
        entity_id: binary_sensor.motion_sensor_1_occupancy
        to: 'on'
    conditions: []
    actions:
      - action: switch.turn_on
        target:
          area_id: basement
    mode: single

  - id: 'pkg_basement_lights_off'
    alias: 'lighting.basement.motion_lights_off'
    description: 'Turn off all basement switches after 15 minutes of no occupancy.'
    triggers:
      - trigger: state
        entity_id: binary_sensor.motion_sensor_1_occupancy
        to: 'off'
        for:
          minutes: 15
    conditions: []
    actions:
      - action: switch.turn_off
        target:
          area_id: basement
    mode: single
